syntax = "proto3";

package auth;

option go_package = "https://github.com/AndreyLebedev1998/auth-grpc/auth";

message ChatIdTgUser {
    string token = 1;
    int64 chat_id = 2;
}

message MessageForUpdateTgUser {
    string msg = 1;
}

message ParamUser {
    string email = 1;
    string phone = 2;
    int64 id = 3;
}

message ChatId {
    int64 chat_id = 1;
}

message NewTelegramToken {
    string token = 1;
}

message TelegramToken {
    int64 id = 1;
    string token = 2;
}

message Empty {}

service AuthService {
    rpc UpdateChatIdTgUser(ChatIdTgUser) returns (MessageForUpdateTgUser);
    rpc GetChatIdForUser(ParamUser) returns (ChatId);
    rpc AddTelegramToken(NewTelegramToken) returns (TelegramToken);
    rpc GetTelegramToken(Empty) returns (TelegramToken);
}
